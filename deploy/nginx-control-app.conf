# Nginx: control-app.ru → Node.js (pm2, порт 3001)
# Установка: sudo cp deploy/nginx-control-app.conf /etc/nginx/sites-available/control-app
#            sudo ln -sf /etc/nginx/sites-available/control-app /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# SSL:       sudo CERTBOT_EMAIL=you@control-app.ru bash deploy/setup-ssl.sh

upstream control_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP — домен и доступ по IP (до certbot). После setup-ssl.sh certbot добавит HTTPS и редирект.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name control-app.ru www.control-app.ru;

    client_max_body_size 12M;
    client_body_timeout 120s;

    # Let's Encrypt (certbot --nginx)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://control_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
